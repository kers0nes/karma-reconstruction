<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma • AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#050505;--bg2:#0a0a0a;--card:#0f0f0f;--card2:#141414;
            --border:#1e1e1e;--border2:#2a2a2a;--fg:#e8e8e8;--fg2:#a0a0a0;
            --muted:#555;--accent:#fff;--accent2:#ccc;
            --glow:rgba(255,255,255,0.04);--glow2:rgba(255,255,255,0.08);
            --danger:#ff4444;--success:#44ff88;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;}
        
        .app{display:flex;flex-direction:column;height:100vh;}
        header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(5,5,5,0.95);}
        .logo{display:flex;align-items:center;gap:11px;font-size:20px;font-weight:700;}
        .logo-icon{width:34px;height:34px;border:2px solid var(--fg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;}
        
        .header-right{display:flex;align-items:center;gap:10px;}
        .user-section{display:flex;align-items:center;gap:8px;}
        .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer;}
        .user-name{font-size:13px;font-weight:500;color:var(--fg2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        
        .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
        .btn-p{background:#fff;color:#000;}
        .btn-g{background:transparent;color:var(--fg2);border:1px solid var(--border);}
        .btn-d{background:rgba(255,68,68,.1);color:#ff4444;border:1px solid rgba(255,68,68,.2);}
        
        .main-wrap{flex:1;display:flex;overflow:hidden;}
        .sidebar{width:260px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;}
        .sb-head{padding:14px;}
        .new-btn{width:100%;padding:10px;background:var(--card);border:1px dashed var(--border2);border-radius:8px;color:var(--fg2);cursor:pointer;}
        
        .chat-list{flex:1;overflow-y:auto;padding:8px;}
        .ci{padding:10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:3px;}
        .ci:hover{background:var(--glow);}
        .ci.act{background:var(--glow2);}
        
        .chat-area{flex:1;display:flex;flex-direction:column;}
        .chat-msgs{flex:1;overflow-y:auto;padding:20px;}
        
        .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
        .w-icon{width:70px;height:70px;border:2px solid var(--border2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;}
        
        .qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:500px;}
        .qa{padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:left;}
        .qa:hover{border-color:var(--border2);}
        
        .msg{display:flex;gap:12px;max-width:780px;margin:0 auto 18px;}
        .msg-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
        .msg-u .msg-av{background:#fff;color:#000;}
        .msg-a .msg-av{background:var(--card2);border:1px solid var(--border2);}
        
        .input-area{padding:16px 24px;border-top:1px solid var(--border);background:rgba(5,5,5,0.95);}
        .iwrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px;}
        .irow{display:flex;gap:8px;align-items:flex-end;}
        #chatInput{flex:1;background:none;border:none;color:var(--fg);font-size:15px;resize:none;outline:none;padding:8px;}
        .send-btn{width:36px;height:36px;border-radius:10px;background:#fff;color:#000;border:none;cursor:pointer;}
        
        .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:200;}
        .modal-ov.show{display:flex;}
        .modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:90%;max-width:380px;}
        
        .auth-tabs{display:flex;margin-bottom:20px;border-bottom:1px solid var(--border);}
        .auth-tab{flex:1;text-align:center;padding:10px;font-weight:600;cursor:pointer;}
        .auth-tab.active{border-bottom:2px solid #fff;color:#fff;}
        
        .mf{margin-bottom:14px;}
        .mf label{display:block;font-size:12px;color:var(--fg2);margin-bottom:6px;}
        .mf input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:15px;}
        
        .fbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg2);margin-bottom:6px;display:none;}
        .fbar.show{display:flex;}
        .fchip{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);padding:3px 9px;border-radius:5px;font-size:12px;color:var(--fg2);}
        
        .msg-b pre{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin:10px 0;position:relative;font-family:'JetBrains Mono',monospace;font-size:13px;overflow-x:auto;}
        .msg-b code{font-family:'JetBrains Mono',monospace;font-size:13px;}
        .cpy-btn{position:absolute;top:8px;right:8px;background:#1e1e1e;border:none;color:#aaa;padding:4px 9px;border-radius:5px;font-size:11px;cursor:pointer;}
        .cpy-btn:hover{color:#fff;}
        
        .toast{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--border);padding:12px 18px;border-radius:10px;z-index:300;}
        
        .sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:150;background:var(--bg2);transition:left .3s;}
        .sidebar.open{left:0;}
        .mob-tog{display:none;}
        
        @media(max-width:768px){.sidebar{position:fixed;left:-280px;}.mob-tog{display:block;}}
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="mob-tog" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="logo">
                    <div class="logo-icon">K</div>
                    <span>Karma</span>
                </div>
            </div>
            <div class="header-right" id="auth-header"></div>
        </header>

        <div class="main-wrap">
            <aside class="sidebar" id="sidebar">
                <div class="sb-head">
                    <button class="new-btn" onclick="newChat()">
                        <i class="fas fa-plus"></i> New Chat
                    </button>
                </div>
                <div class="chat-list" id="chatList"></div>
                <div style="padding:12px;border-top:1px solid var(--border);">
                    <button class="btn btn-g" onclick="exportChats()" style="width:100%;margin-bottom:6px;">Export Chats</button>
                    <button class="btn btn-d" onclick="clearAll()" style="width:100%;">Clear All</button>
                </div>
            </aside>

            <div class="chat-area">
                <div class="chat-msgs" id="chatMsgs">
                    <div class="welcome" id="welcome">
                        <div class="w-icon"><i class="fas fa-bolt"></i></div>
                        <h2>What can I build for you?</h2>
                        <p style="margin:10px 0 30px;color:var(--fg2);">Sign in to start chatting</p>
                        
                        <div class="qa-grid">
                            <div class="qa" onclick="quickPrompt('Write a Roblox infinite yield script')">
                                <div style="font-weight:600;">Write a Script</div>
                            </div>
                            <div class="qa" onclick="quickPrompt('Refactor my code')">
                                <div style="font-weight:600;">Refactor Code</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="iwrap">
                        <div class="fbar" id="fbar"></div>
                        <div class="irow">
                            <button class="iabtn" onclick="document.getElementById('fInput').click()" title="Upload file" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <textarea id="chatInput" placeholder="Ask me anything about Roblox scripts..." 
                                      onkeydown="handleKey(event)" style="height:24px;"></textarea>
                            <button class="send-btn" onclick="sendMessage()">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-ov" id="authModal">
        <div class="modal">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
                <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</div>
            </div>

            <div id="login-form">
                <div class="mf">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@email.com">
                </div>
                <div class="mf">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <div style="display:flex;gap:10px;margin-top:20px;">
                    <button class="btn btn-g" onclick="closeAuthModal()" style="flex:1;">Cancel</button>
                    <button class="btn btn-p" onclick="loginUser()" style="flex:1;">Sign In</button>
                </div>
            </div>

            <div id="register-form" style="display:none;">
                <div class="mf">
                    <label>Email</label>
                    <input type="email" id="register-email" placeholder="you@email.com">
                </div>
                <div class="mf">
                    <label>Password</label>
                    <input type="password" id="register-password" placeholder="••••••••">
                </div>
                <div class="mf">
                    <label>Confirm Password</label>
                    <input type="password" id="register-confirm" placeholder="••••••••">
                </div>
                <div style="display:flex;gap:10px;margin-top:20px;">
                    <button class="btn btn-g" onclick="closeAuthModal()" style="flex:1;">Cancel</button>
                    <button class="btn btn-p" onclick="registerUser()" style="flex:1;">Create Account</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fInput" multiple accept=".lua,.txt" style="display:none" onchange="handleFiles(this.files)">
    <div class="toast-c" id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:999;"></div>

    <script>
        // ========== CUSTOM EMAIL AUTH ==========
        let currentUser = null;

        function getUsers() {
            return JSON.parse(localStorage.getItem('karma_users') || '{}');
        }

        function saveUsers(users) {
            localStorage.setItem('karma_users', JSON.stringify(users));
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('karma_current_user') || 'null');
        }

        function setCurrentUser(user) {
            if (user) {
                localStorage.setItem('karma_current_user', JSON.stringify(user));
            } else {
                localStorage.removeItem('karma_current_user');
            }
            currentUser = user;
        }

        // ========== STATE ==========
        let chats = [];
        let activeChatId = null;
        let attachedFiles = [];

        // ========== INIT ==========
        function init() {
            currentUser = getCurrentUser();
            renderHeader();

            if (!currentUser) {
                showAuthGate();
            } else {
                loadChats();
            }
        }

        function loadChats() {
            const key = currentUser ? `karma_chats_${currentUser.email}` : 'karma_chats';
            chats = JSON.parse(localStorage.getItem(key) || '[]');
            renderChatList();
            
            if (chats.length > 0) {
                loadChat(chats[0].id);
            }
        }

        function saveChats() {
            const key = currentUser ? `karma_chats_${currentUser.email}` : 'karma_chats';
            localStorage.setItem(key, JSON.stringify(chats));
        }

        // ========== AUTH ==========
        function registerUser() {
            const email = document.getElementById('register-email').value.trim().toLowerCase();
            const pass = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (!email || !pass || !confirm) return showToast('Fill all fields', 'err');
            if (!email.includes('@')) return showToast('Invalid email', 'err');
            if (pass.length < 4) return showToast('Password too short', 'err');
            if (pass !== confirm) return showToast('Passwords do not match', 'err');

            const users = getUsers();
            if (users[email]) return showToast('Email already registered', 'err');

            users[email] = { email, password: pass };
            saveUsers(users);

            setCurrentUser({ email });
            closeAuthModal();
            renderHeader();
            loadChats();
            showToast('Account created!', 'ok');
        }

        function loginUser() {
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const pass = document.getElementById('login-password').value;

            if (!email || !pass) return showToast('Enter email and password', 'err');

            const users = getUsers();
            const user = users[email];

            if (!user) return showToast('No account found', 'err');
            if (user.password !== pass) return showToast('Wrong password', 'err');

            setCurrentUser({ email });
            closeAuthModal();
            renderHeader();
            loadChats();
            showToast('Signed in!', 'ok');
        }

        function logoutUser() {
            setCurrentUser(null);
            chats = [];
            activeChatId = null;
            renderHeader();
            document.getElementById('chatList').innerHTML = '';
            showAuthGate();
        }

        function renderHeader() {
            const container = document.getElementById('auth-header');
            
            if (!currentUser) {
                container.innerHTML = `
                    <button class="btn btn-g" onclick="openAuthModal()">Sign In</button>
                    <button class="btn btn-p" onclick="openAuthModal()">Sign Up</button>
                `;
            } else {
                const name = currentUser.email.split('@')[0];
                container.innerHTML = `
                    <div class="user-section">
                        <div class="user-avatar" onclick="showUserMenu()">
                            <span>${name[0].toUpperCase()}</span>
                        </div>
                        <div class="user-name">${name}</div>
                        <button class="btn btn-g" onclick="logoutUser()" style="padding:6px 10px;">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                `;
            }
        }

        function showUserMenu() {
            const menu = document.createElement('div');
            menu.style.cssText = 'position:absolute;top:55px;right:24px;background:#0f0f0f;border:1px solid #1e1e1e;border-radius:10px;padding:8px 0;width:180px;z-index:300;';
            menu.innerHTML = `
                <div style="padding:10px 16px;border-bottom:1px solid #1e1e1e;">
                    <div style="font-size:13px;">${currentUser.email}</div>
                </div>
                <div onclick="logoutUser()" style="padding:11px 16px;cursor:pointer;color:#aaa;">Sign out</div>
            `;
            document.body.appendChild(menu);
            
            setTimeout(() => {
                document.addEventListener('click', function handler(e) {
                    if (!menu.contains(e.target)) {
                        menu.remove();
                        document.removeEventListener('click', handler);
                    }
                }, { once: true });
            }, 100);
        }

        function openAuthModal() {
            document.getElementById('authModal').classList.add('show');
            switchTab('login');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('show');
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
            }
        }

        function showAuthGate() {
            const container = document.getElementById('chatMsgs');
            container.innerHTML = `
                <div class="welcome">
                    <div class="w-icon"><i class="fas fa-user-lock"></i></div>
                    <h2>Sign in to continue</h2>
                    <p style="margin:15px 0 30px;color:#777;">Create an account or sign in</p>
                    <div style="display:flex;gap:10px;">
                        <button class="btn btn-g" onclick="openAuthModal()" style="padding:10px 30px;">Sign In</button>
                        <button class="btn btn-p" onclick="openAuthModal()" style="padding:10px 30px;">Sign Up</button>
                    </div>
                </div>
            `;
        }

        // ========== CHAT ==========
        function newChat() {
            if (!currentUser) return openAuthModal();

            const chat = {
                id: 'c_' + Date.now(),
                title: 'New Chat',
                messages: [],
                created: Date.now()
            };

            chats.unshift(chat);
            saveChats();
            loadChat(chat.id);
            renderChatList();
        }

        function loadChat(id) {
            activeChatId = id;
            renderChatList();
            renderMessages();
        }

        function getCurrentChat() {
            return chats.find(c => c.id === activeChatId);
        }

        function renderChatList() {
            const container = document.getElementById('chatList');
            let html = '';

            chats.forEach(chat => {
                const active = chat.id === activeChatId ? 'act' : '';
                html += `
                    <div class="ci ${active}" onclick="loadChat('${chat.id}')">
                        <span style="flex:1;">${chat.title}</span>
                        <button onclick="event.stopImmediatePropagation();deleteChat('${chat.id}')" style="background:none;border:none;color:#555;cursor:pointer;">×</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);
            saveChats();
            if (activeChatId === id) {
                activeChatId = chats.length > 0 ? chats[0].id : null;
                renderMessages();
            }
            renderChatList();
        }

        function renderMessages() {
            const container = document.getElementById('chatMsgs');
            const chat = getCurrentChat();

            container.innerHTML = '';

            if (!chat || chat.messages.length === 0) {
                container.innerHTML = `
                    <div class="welcome">
                        <div class="w-icon"><i class="fas fa-bolt"></i></div>
                        <h2>What can I build for you?</h2>
                    </div>
                `;
                return;
            }

            chat.messages.forEach(msg => {
                const isUser = msg.role === 'user';
                const div = document.createElement('div');
                div.className = `msg ${isUser ? 'msg-u' : 'msg-a'}`;
                
                let contentHTML = msg.content;
                
                // Format code blocks
                contentHTML = contentHTML.replace(/```([\s\S]*?)```/g, (match, code) => {
                    return `<pre><code>${code.trim()}</code><button class="cpy-btn" onclick="copyCode(this)">Copy</button></pre>`;
                });

                div.innerHTML = `
                    <div class="msg-av">${isUser ? 'U' : 'K'}</div>
                    <div style="flex:1;">
                        <div style="font-size:11px;color:#777;margin-bottom:4px;">${isUser ? 'You' : 'Karma'}</div>
                        <div class="msg-b" style="line-height:1.6;">${contentHTML}</div>
                    </div>
                `;
                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
            
            // Add copy buttons to all code blocks
            addCopyButtons();
        }

        function addCopyButtons() {
            document.querySelectorAll('.msg-b pre').forEach(pre => {
                if (!pre.querySelector('.cpy-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'cpy-btn';
                    btn.textContent = 'Copy';
                    btn.onclick = () => copyCode(btn);
                    pre.appendChild(btn);
                }
            });
        }

        function copyCode(btn) {
            const code = btn.parentElement.querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        }

        function sendMessage() {
            if (!currentUser) return openAuthModal();

            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text && attachedFiles.length === 0) return;

            if (!activeChatId) newChat();

            const chat = getCurrentChat();
            if (!chat) return;

            let fullContent = text;
            
            if (attachedFiles.length > 0) {
                attachedFiles.forEach(file => {
                    fullContent += `\n\n[File: ${file.name}]\n\`\`\`\n${file.content}\n\`\`\``;
                });
                attachedFiles = [];
                document.getElementById('fbar').innerHTML = '';
                document.getElementById('fbar').classList.remove('show');
            }

            chat.messages.push({ role: 'user', content: fullContent });

            if (chat.messages.length === 1) {
                chat.title = text.length > 35 ? text.substring(0, 35) + '...' : (text || 'File Analysis');
                renderChatList();
            }

            input.value = '';
            saveChats();
            renderMessages();

            // AI response
            setTimeout(() => {
                const response = generateResponse(text);
                chat.messages.push({ role: 'assistant', content: response });
                saveChats();
                renderMessages();
            }, 900);
        }

        function generateResponse(text) {
            const lower = text.toLowerCase();
            
            if (lower.includes('infinite yield') || lower.includes('script')) {
                return `Here's a clean Roblox script:\n\n\`\`\`lua\nlocal Players = game:GetService("Players")\nlocal player = Players.LocalPlayer\n\nprint("Hello from Karma AI!")\n\`\`\``;
            }
            
            return "Thanks! I can help with Roblox scripting. Try asking for a specific script or upload a .lua file.";
        }

        function quickPrompt(text) {
            if (!currentUser) return openAuthModal();
            document.getElementById('chatInput').value = text;
            sendMessage();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ========== FILE UPLOAD ==========
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    attachedFiles.push({
                        name: file.name,
                        content: e.target.result
                    });
                    renderFileBar();
                };
                reader.readAsText(file);
            });
            document.getElementById('fInput').value = '';
        }

        function renderFileBar() {
            const bar = document.getElementById('fbar');
            
            if (attachedFiles.length === 0) {
                bar.classList.remove('show');
                bar.innerHTML = '';
                return;
            }
            
            bar.classList.add('show');
            bar.innerHTML = attachedFiles.map((f, i) => `
                <div class="fchip">
                    <i class="fas fa-file-code"></i> ${f.name}
                    <button onclick="removeFile(${i})" style="background:none;border:none;color:#777;cursor:pointer;">×</button>
                </div>
            `).join('');
        }

        function removeFile(index) {
            attachedFiles.splice(index, 1);
            renderFileBar();
        }

        // ========== UTILS ==========
        function showToast(message, type = 'ok') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderColor = type === 'err' ? '#ff4444' : '#44ff88';
            toast.innerHTML = message;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2800);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function clearAll() {
            if (!confirm('Clear all chats?')) return;
            chats = [];
            activeChatId = null;
            saveChats();
            renderChatList();
            renderMessages();
        }

        function exportChats() {
            const data = JSON.stringify(chats, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'karma_chats.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Start the app
        window.onload = init;
    </script>
</body>
</html>
